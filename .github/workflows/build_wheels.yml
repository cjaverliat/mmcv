name: build wheels

# Build mmcv wheels across recent CUDA + torch on Linux/Windows/macOS and, on a
# version tag, publish them to the GitHub Release. setup.py names each wheel with
# a +cuXXXtorchYY local label; at install time it downloads the matching prebuilt
# wheel from that release (flash-attn style) or falls back to building.

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  # Manual smoke-build of a single config without a release:
  #   Actions -> build wheels -> Run workflow

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Compile the ops (never try to download a prebuilt wheel while producing one).
  MMCV_FORCE_BUILD: '1'
  MMCV_WITH_OPS: '1'
  # SM 7.5 (Turing) .. 9.0 (Hopper) + PTX for forward compat.
  TORCH_CUDA_ARCH_LIST: '7.5 8.0 8.6 8.9 9.0+PTX'

jobs:
  build_cuda:
    name: cuda ${{ matrix.cuda }} torch ${{ matrix.torch }} py${{ matrix.python-version }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022]
        python-version: ['3.10', '3.11', '3.12']
        include:
          - torch: '2.6.0'
            cuda: '12.4.0'
            cuda_tag: cu124
          - torch: '2.7.0'
            cuda: '12.6.0'
            cuda_tag: cu126
          - torch: '2.8.0'
            cuda: '12.8.0'
            cuda_tag: cu128
          - torch: '2.9.0'
            cuda: '12.8.0'
            cuda_tag: cu128
    env:
      FORCE_CUDA: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CUDA Toolkit ${{ matrix.cuda }}
        uses: Jimver/cuda-toolkit@v0.2.19
        id: cuda
        with:
          cuda: ${{ matrix.cuda }}
          method: network
          # Only the compiler + libs needed to build the ext (keeps it small).
          sub-packages: '["nvcc", "cudart", "cccl"]'
          non-cuda-sub-packages: '["libcublas", "libcublas-dev"]'

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install build deps + PyTorch (${{ matrix.cuda_tag }})
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools psutil
          pip install torch==${{ matrix.torch }} \
            --index-url https://download.pytorch.org/whl/${{ matrix.cuda_tag }} \
            --no-cache-dir
        shell: bash

      - name: Build wheel
        run: python setup.py bdist_wheel
        shell: bash

      - name: List wheels
        run: ls -la dist/
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: mmcv-${{ matrix.cuda_tag }}-torch${{ matrix.torch }}-py${{ matrix.python-version }}-${{ matrix.os }}
          path: dist/*.whl

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl

  build_cpu:
    name: cpu torch ${{ matrix.torch }} py${{ matrix.python-version }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-14]
        python-version: ['3.10', '3.11', '3.12']
        torch: ['2.6.0', '2.7.0', '2.8.0', '2.9.0']
    env:
      # macOS arm64 deployment target must match setup.py's reconstructed
      # platform tag (macosx_11_0_arm64).
      MACOSX_DEPLOYMENT_TARGET: '11.0'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install build deps + PyTorch (cpu)
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools psutil
          pip install torch==${{ matrix.torch }} \
            --index-url https://download.pytorch.org/whl/cpu \
            --no-cache-dir
        shell: bash

      - name: Build wheel
        # macOS arm64 torch is MPS-capable -> setup.py compiles the MPS/CPU ops.
        run: python setup.py bdist_wheel
        shell: bash

      - name: List wheels
        run: ls -la dist/
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: mmcv-cpu-torch${{ matrix.torch }}-py${{ matrix.python-version }}-${{ matrix.os }}
          path: dist/*.whl

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
